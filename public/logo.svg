<svg viewBox="0 0 64 64" xmlns="http://www.w3.org/2000/svg" xmlns:xlink="http://www.w3.org/1999/xlink">
  <defs>
    <linearGradient id="logoGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#f39b62;stop-opacity:1" />
      <stop offset="60%" style="stop-color:#b54b34;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#7d2f20;stop-opacity:1" />
    </linearGradient>
    <filter id="logoShadow">
      <feGaussianBlur in="SourceGraphic" stdDeviation="3" />
      <feOffset dx="0" dy="2" result="offsetblur" />
      <feComponentTransfer>
        <feFuncA type="linear" slope="0.2" />
      </feComponentTransfer>
      <feMerge>
        <feMergeNode />
        <feMergeNode in="SourceGraphic" />
      </feMerge>
    </filter>
  </defs>

  <!-- Main circle with gradient -->
  <circle
    cx="32"
    cy="32"
    r="26"
    fill="url(#logoGradient)"
    filter="url(#logoShadow)"
  />

  <!-- Accent ring -->
  <circle
    cx="32"
    cy="32"
    r="26"
    fill="none"
    stroke="rgba(181, 75, 52, 0.2)"
    stroke-width="3"
    opacity="0.6"
  />

  <!-- Center accent dot -->
  <circle
    cx="32"
    cy="32"
    r="5"
    fill="rgba(255, 249, 243, 0.3)"
  />
</svg>
