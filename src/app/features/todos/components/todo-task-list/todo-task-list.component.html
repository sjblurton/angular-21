<section
  [attr.data-testid]="testIds.root"
  class="todo-list-region"
  aria-labelledby="todo-list-heading"
>
  <div class="list-heading-row">
    <h3 id="todo-list-heading">Task list</h3>
  </div>

  @if (todos().length > 0) {
    <ul class="todo-list" role="list">
      @for (todo of todos(); track todo.id) {
        <li class="todo-list-item">
          <app-todo-item
            [todo]="todo"
            (toggleRequested)="requestToggle($event)"
            (deleteRequested)="requestDelete($event)"
          ></app-todo-item>
        </li>
      }
    </ul>
  } @else {
    <div class="empty-state" aria-live="polite">
      <mat-icon>search_off</mat-icon>
      <h3 [attr.data-testid]="testIds.emptyHeading">No items match this view.</h3>
      <p>Try a broader search or switch the status filter.</p>
    </div>
  }
</section>
