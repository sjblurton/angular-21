<article
  class="todo-item"
  [class.todo-item-complete]="todo().completed"
  [attr.data-testid]="testIds.root"
>
  <mat-checkbox
    class="todo-toggle"
    [attr.data-testid]="testIds.checkbox"
    [checked]="todo().completed"
    [aria-label]="
      todo().completed
        ? 'Mark ' + todo().title + ' as active'
        : 'Mark ' + todo().title + ' as completed'
    "
    (change)="requestToggle()"
  ></mat-checkbox>

  <div class="todo-copy">
    <p class="todo-title" [attr.data-testid]="testIds.title">{{ todo().title }}</p>
    <p class="todo-meta" [attr.data-testid]="testIds.meta">
      {{ todo().completed ? 'Completed' : 'In progress' }} · Added
      {{ todo().createdAt | distanceToNow }}
    </p>
  </div>

  <div class="todo-actions">
    <button
      mat-stroked-button
      type="button"
      class="state-button"
      [attr.data-testid]="testIds.stateButton"
      (click)="requestToggle()"
    >
      <mat-icon>{{ todo().completed ? 'refresh' : 'task_alt' }}</mat-icon>
      {{ todo().completed ? 'Reopen' : 'Complete' }}
    </button>

    <button
      mat-icon-button
      type="button"
      class="delete-button"
      [attr.data-testid]="testIds.deleteButton"
      [attr.aria-label]="'Delete ' + todo().title"
      (click)="requestDelete()"
    >
      <mat-icon>delete</mat-icon>
    </button>
  </div>
</article>
