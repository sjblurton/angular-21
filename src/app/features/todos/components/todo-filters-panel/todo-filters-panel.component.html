<div [attr.data-testid]="testIds.root" class="filters-panel">
  <mat-form-field appearance="outline" class="search-field">
    <mat-label>Search items</mat-label>
    <mat-icon matPrefix>search</mat-icon>
    <input
      matInput
      [formControl]="searchControl()"
      placeholder="Search by task name"
      [attr.data-testid]="testIds.searchInput"
    />
  </mat-form-field>

  <div class="status-group">
    <span class="status-label">Status</span>
    <mat-button-toggle-group
      name="statusFilter"
      class="status-toggle"
      [value]="selectedFilter()"
      aria-label="Filter items by status"
      (change)="requestFilterChange($event.value)"
    >
      <mat-button-toggle value="all" [attr.data-testid]="testIds.filterAll">All</mat-button-toggle>
      <mat-button-toggle value="active" [attr.data-testid]="testIds.filterActive"
        >Active</mat-button-toggle
      >
      <mat-button-toggle value="completed" [attr.data-testid]="testIds.filterCompleted"
        >Completed</mat-button-toggle
      >
    </mat-button-toggle-group>
  </div>
</div>
