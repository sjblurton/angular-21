<main [attr.data-testid]="testIds.root" class="todo-page">
  <app-todo-hero [total]="totalCount()" [active]="activeCount()" [completed]="completedCount()">
    <section class="workspace-card" aria-labelledby="workspace-heading">
      <div class="workspace-header">
        <p class="workspace-kicker">Today&apos;s focus</p>
        <h2 id="workspace-heading">Keep the queue clear and visible.</h2>
      </div>

      <app-todo-add-form
        [addTodoForm]="addTodoForm"
        [titleControl]="addTodoControl"
        (addRequested)="addTodo()"
      ></app-todo-add-form>

      <app-todo-filters-panel
        [searchControl]="searchControl"
        [selectedFilter]="selectedFilter()"
        (filterChanged)="setFilter($event)"
      ></app-todo-filters-panel>

      <div class="results-bar">
        <p class="results-copy" aria-live="polite" [attr.data-testid]="testIds.resultsSummary">
          {{ resultsSummary() }}
        </p>

        @if (selectedFilter() !== 'all' || searchDisplayValue().length > 0) {
          <button
            mat-stroked-button
            type="button"
            [attr.data-testid]="testIds.resetViewButton"
            (click)="clearFilters()"
          >
            Reset view
          </button>
        }
      </div>

      <app-todo-task-list
        [todos]="visibleTodos()"
        (toggleRequested)="toggleTodo($event)"
        (deleteRequested)="deleteTodo($event)"
      ></app-todo-task-list>
    </section>
  </app-todo-hero>
</main>
