name: CI

on:
  push:
    branches:
      - main
  pull_request:

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

      - name: Unit tests with strict coverage
        run: npm run test:coverage

      - name: Upload coverage report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: coverage/angular-21

      - name: Run Playwright tests
        run: npm run e2e

      - name: Upload Playwright report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 30

      - name: Build Storybook
        run: ng run angular-21:build-storybook

      - name: Checkout base branch for VRT baselines
        if: github.event_name == 'pull_request'
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.base.sha }}
          path: baseline
          fetch-depth: 1

      - name: Prepare VRT baselines from base branch
        if: github.event_name == 'pull_request'
        run: |
          # Preserve PR branch snapshots in e2e/vrt/stories.spec.ts-snapshots.
          # Copy base-branch snapshots into a separate directory for review/diff purposes.
          mkdir -p vrt-baseline/e2e/vrt
          if [ -d baseline/e2e/vrt/stories.spec.ts-snapshots ]; then
            cp -R baseline/e2e/vrt/stories.spec.ts-snapshots vrt-baseline/e2e/vrt/stories.spec.ts-snapshots
          else
            echo "No baseline snapshots found on base branch."
          fi

      - name: Run VRT compare tests
        id: vrt_compare
        continue-on-error: true
        run: npm run e2e:vrt

      - name: Upload VRT compare report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: vrt-report
          path: |
            playwright-report/
            test-results/
          retention-days: 30

      - name: Generate candidate VRT snapshots
        id: vrt_update
        if: github.event_name == 'pull_request'
        continue-on-error: true
        run: npm run e2e:vrt:update

      - name: Build VRT review bundle
        if: github.event_name == 'pull_request'
        run: |
          mkdir -p vrt-candidate
          if [ -d baseline/e2e/vrt/stories.spec.ts-snapshots ]; then
            cp -R baseline/e2e/vrt/stories.spec.ts-snapshots vrt-candidate/base-snapshots
          fi
          if [ -d e2e/vrt/stories.spec.ts-snapshots ]; then
            cp -R e2e/vrt/stories.spec.ts-snapshots vrt-candidate/candidate-snapshots
          fi
          {
            echo "# VRT review bundle"
            echo ""
            if [ -d baseline/e2e/vrt/stories.spec.ts-snapshots ] && [ -d e2e/vrt/stories.spec.ts-snapshots ]; then
              echo "Diff between base snapshots and PR candidate snapshots:"
              diff -rq baseline/e2e/vrt/stories.spec.ts-snapshots e2e/vrt/stories.spec.ts-snapshots || true
            else
              echo "Base snapshots or candidate snapshots are missing."
            fi
          } > vrt-candidate/README.txt
          cat vrt-candidate/README.txt >> "$GITHUB_STEP_SUMMARY"

      - name: Upload VRT review bundle
        if: github.event_name == 'pull_request'
        uses: actions/upload-artifact@v4
        with:
          name: vrt-candidate-snapshots
          path: vrt-candidate/
          retention-days: 30

      - name: Fail if visual differences were detected
        if: steps.vrt_compare.outcome == 'failure' || steps.vrt_update.outcome == 'failure'
        run: |
          echo "Visual changes were detected by VRT."
          echo "Review the 'vrt-report' and 'vrt-candidate-snapshots' artifacts, then commit approved snapshot changes to the PR branch."
          exit 1
