name: CI

on:
  push:
    branches:
      - main
  pull_request:

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright browser
        run: npx playwright install --with-deps chromium

      - name: Build
        run: npm run build

      - name: Unit tests with strict coverage
        run: npm run test:coverage

      - name: Upload coverage report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: coverage/angular-21

      - name: Run Playwright tests
        run: npm run e2e

      - name: Upload Playwright report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 30

      - name: Build Storybook
        if: github.event_name == 'pull_request'
        run: npx ng run angular-21:build-storybook

      - name: Checkout base branch for VRT baselines
        if: github.event_name == 'pull_request'
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.base.sha }}
          path: baseline
          fetch-depth: 1

      - name: Prepare VRT baselines from base branch
        if: github.event_name == 'pull_request'
        run: |
          # Copy base-branch snapshots into a separate directory for review/diff purposes.
          mkdir -p vrt-baseline/snapshots/vrt
          if [ -d baseline/snapshots/vrt/stories.spec.ts ]; then
            cp -R baseline/snapshots/vrt/stories.spec.ts vrt-baseline/snapshots/vrt/stories.spec.ts
          else
            echo "No baseline snapshots found on base branch."
          fi

      - name: Generate candidate VRT snapshots
        id: vrt_update
        if: github.event_name == 'pull_request'
        continue-on-error: true
        run: npm run e2e:vrt:update

      - name: Upload VRT run report
        if: github.event_name == 'pull_request'
        uses: actions/upload-artifact@v4
        with:
          name: vrt-report
          path: |
            playwright-report/
            test-results/
          retention-days: 30

      - name: Build VRT review bundle
        if: github.event_name == 'pull_request'
        run: |
          mkdir -p vrt-candidate
          if [ -d baseline/snapshots/vrt/stories.spec.ts ]; then
            cp -R baseline/snapshots/vrt/stories.spec.ts vrt-candidate/base-snapshots
          fi
          if [ -d snapshots/vrt/stories.spec.ts ]; then
            cp -R snapshots/vrt/stories.spec.ts vrt-candidate/candidate-snapshots
          fi
          {
            echo "# VRT review bundle"
            echo ""
            echo "VRT is non-blocking in CI. Review artifacts in this PR and commit approved snapshots manually."
            echo ""
            if [ -d baseline/snapshots/vrt/stories.spec.ts ] && [ -d snapshots/vrt/stories.spec.ts ]; then
              echo "Diff between base snapshots and PR candidate snapshots:"
              diff -rq baseline/snapshots/vrt/stories.spec.ts snapshots/vrt/stories.spec.ts || true
            else
              echo "Base snapshots or candidate snapshots are missing."
            fi
          } > vrt-candidate/README.txt
          cat vrt-candidate/README.txt >> "$GITHUB_STEP_SUMMARY"

      - name: Upload VRT review bundle
        if: github.event_name == 'pull_request'
        uses: actions/upload-artifact@v4
        with:
          name: vrt-candidate-snapshots
          path: vrt-candidate/
          retention-days: 30
