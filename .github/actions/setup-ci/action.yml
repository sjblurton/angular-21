name: Setup CI
description: Set up Node.js dependencies and Playwright for CI jobs.

inputs:
  node-version:
    description: Node.js version to install.
    required: false
    default: '22.x'

runs:
  using: composite
  steps:
    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: ${{ inputs.node-version }}
        cache: npm

    - name: Install dependencies
      shell: bash
      run: npm ci

    - name: Install Playwright browser
      shell: bash
      run: npx playwright install --with-deps chromium
